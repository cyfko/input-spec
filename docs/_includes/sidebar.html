<div class="sidebar-content">
  <h2>{{ site.title }}</h2>
  <ul>
    {% assign pages = site.pages | where_exp: "p", "p.path contains 'docs/' and p.name != 'index.md'" | sort: "title" %}
    {% for page in pages %}
      <li><a href="{{ page.url | relative_url }}">{{ page.title | default: page.name | replace: '.md', '' }}</a></li>
    {% endfor %}
  </ul>
</div>
