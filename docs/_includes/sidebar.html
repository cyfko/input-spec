<div class="sidebar-content">
  <h2>{{ site.title }}</h2>
  <ul>
    {% for page in site.pages %}
      {% if page.path contains 'docs/' and page.name != 'index.md' %}
        <li><a href="{{ page.url | relative_url }}">{{ page.title | default: page.name | replace: '.md', '' }}</a></li>
      {% endif %}
    {% endfor %}
  </ul>
</div>
